# vsdlc reformats this file on every install; user comments are NOT
# preserved inside the framework-managed tables ([framework], [workspace],
# [forge], [adapters]). Add custom annotations OUTSIDE these tables (e.g.
# at the end of the file under a custom top-level table) to retain them.

[framework]
package = "@vention/sdlc"
version = "0.0.1"

[forge]
workspace_id = "my-forge-id"

[workspace]
name = "gitai-service-a"
type = "single-repo"

[adapters.issue-tracker]
base_url = "https://yt-wod.ventionteams.com/"
project_key = "WOD"
type = "youtrack"
